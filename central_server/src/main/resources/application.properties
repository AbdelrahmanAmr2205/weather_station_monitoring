spring.application.name=central_server

# -----------------------------------------------------------------------
# Kafka Consumer
# -----------------------------------------------------------------------
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.consumer.group-id=central-server-consumer
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.weatherStatus.central_server.dto.WeatherStatusDTO

# -----------------------------------------------------------------------
# Parquet Archival
# -----------------------------------------------------------------------

# Root output directory (relative to the working directory of the process).
parquet.output.dir=data/parquet

# Batch-size trigger: flush a station's buffer when it accumulates this many records.
parquet.batch.size=10000

# Time-based trigger: flush all station buffers every N milliseconds (120 000 = 2 minutes).
# parquet.flush.interval.ms=120000
parquet.flush.interval.ms=30000

# -----------------------------------------------------------------------
# Bitcask KV Client
# -----------------------------------------------------------------------
bitcask.url=http://localhost:9095
