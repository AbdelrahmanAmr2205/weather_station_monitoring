services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    container_name: node1
    environment:
      - node.name=ws-node1
      - cluster.name=weather-status-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - weather-status-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  parquet-ingestor:
      build:
        context: ./parquet-ingestor
      container_name: parquet-ingestor
      depends_on:
        - elasticsearch
      volumes:
        - ./shared_storage:/app/data  # TODO: change this path based on location of shared storage
      environment:
        - ELASTICSEARCH_HOST=http://elasticsearch:9200
volumes:
  weather-status-data: